name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          gleam-version: "1.14.0"
          rebar3-version: "3"
      - name: Install dependencies
        run: gleam deps download
      - name: Download DaisyUI files
        run: |
          mkdir -p src/vendor && \
          curl -sLo src/vendor/daisyui.mjs https://github.com/saadeghi/daisyui/releases/latest/download/daisyui.mjs && \
          curl -sLo src/vendor/daisyui-theme.mjs https://github.com/saadeghi/daisyui/releases/latest/download/daisyui-theme.mjs
      - name: Build app
        run: gleam run -m lustre/dev build --minify --outdir=dist
      # - name: Fix asset paths for GitHub Pages
      #   run: |
      #     sed -i 's|src="/defense_ev_calculator.js"|src="/defense-ev-calculator/defense_ev_calculator.js"|' dist/index.html
      #     sed -i 's|href="/defense_ev_calculator.css"|href="/defense-ev-calculator/defense_ev_calculator.css"|' dist/index.html
      #     sed -i 's|href="/favicon.ico"|href="/defense-ev-calculator/favicon.ico"|' dist/index.html
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish to Cloudflare Pages
        run: |
          npx wrangler pages deploy ./dist \
            --project-name=defense-calculator
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}